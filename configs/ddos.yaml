# DDoS protection — default configuration.
# Hot-reloaded on file save (~250ms debounce).

ddos:
  schema_version: 1
  enabled: true
  hot_reload: true
  gc_interval_s: 60
  max_keys: 100000
  tiers:
    critical:
      per_fp_threshold: 50
      per_fp_window_s: 10
      per_tier_threshold: 500
      per_tier_window_s: 10
    high:
      per_fp_threshold: 100
      per_fp_window_s: 10
      per_tier_threshold: 1000
      per_tier_window_s: 10
    medium:
      per_fp_threshold: 200
      per_fp_window_s: 10
      per_tier_threshold: 2000
      per_tier_window_s: 10
    catch_all:
      per_fp_threshold: 500
      per_fp_window_s: 10
      per_tier_threshold: 5000
      per_tier_window_s: 10
