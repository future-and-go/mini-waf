# Relay & Proxy Intel — default configuration.
# Hot-reloaded on file save.

relay_detection:
  trusted_proxies: []
  max_chain_depth: 3
  headers:
    forwarded_for:
      - "X-Forwarded-For"
      - "X-Real-IP"
  asn:
    provider: null
    fail_close: false
  tor:
    list_path: null
  signals:
    enabled: []
    risk_score_delta:
      tor_exit: 30
      datacenter: 15
      bad_asn: 25
