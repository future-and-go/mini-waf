[proxy]
listen_addr = "0.0.0.0:80"
listen_addr_tls = "0.0.0.0:443"

[api]
listen_addr = "0.0.0.0:9527"

[storage]
database_url = "postgresql://prx_waf:prx_waf@postgres:5432/prx_waf"
max_connections = 20

# ── FR-009: Response Caching ──────────────────────────────────────────────────
#
# backend choices:
#   "memory"     — in-process Moka LRU (no extra process; default for local dev)
#   "embedded"   — spawn valkey-server as a child process via UNIX socket
#   "standalone" — connect to an external Valkey/Redis instance
#   "cluster"    — connect to a Valkey cluster (topology auto-discovered)
#
# For "embedded" / "standalone" / "cluster" the binary must be built with
# the `valkey` feature flag:  cargo build --features gateway/valkey
#
# The `CACHE_BACKEND` env var overrides this field at startup (see docker-compose.yml
# and docs/valkey-cache-guide.md §3.1) so a single shared config file works for
# both bare-metal local runs and Compose deployments.
#
[cache]
enabled = true
max_size_mb = 256
default_ttl_secs = 60
max_ttl_secs = 3600
# FR-009 Phase 3: per-route TTL rules. Hot-reloaded on file change.
# Missing file is non-fatal at boot (logs warn, runs with no per-route rules).
rules_path = "rules/cache.yaml"
# Default to in-process moka so a fresh `cargo run` works without an external
# Valkey/Redis. docker-compose.yml sets CACHE_BACKEND=standalone to switch the
# stack to the bundled `valkey` service automatically.
backend = "memory"

# ── Embedded Valkey (backend = "embedded") ────────────────────────────────────
# Spawns a valkey-server child process using a UNIX socket.
# No separate container or service is needed.
#
# [cache.embedded]
# binary_path = ""              # auto-detect from $PATH or /usr/local/bin/valkey-server
# data_dir    = "/tmp/prx-valkey"
# extra_args  = []              # additional valkey-server flags

# ── Standalone Valkey (backend = "standalone") ────────────────────────────────
# Hostname `valkey` matches the docker-compose.yml service name.
#
[cache.valkey]
seeds                    = ["valkey:6379"]
password                 = ""
db                       = 0
tls                      = false
pool_size                = 4
connect_timeout_ms       = 2000
command_timeout_ms       = 500
circuit_breaker_threshold  = 5
circuit_breaker_reset_secs = 30
fallback_to_memory       = true

# ── Valkey Cluster (backend = "cluster") ─────────────────────────────────────
#
# [cache.valkey]
# seeds                    = ["10.0.1.1:6379", "10.0.1.2:6379", "10.0.1.3:6379"]
# password                 = ""
# tls                      = true
# tls_ca_cert              = "/etc/prx-waf/tls/valkey-ca.pem"
# pool_size                = 4
# connect_timeout_ms       = 2000
# command_timeout_ms       = 500
# circuit_breaker_threshold  = 5
# circuit_breaker_reset_secs = 30
# fallback_to_memory       = true

# ── Phase 5: HTTP/3 (QUIC) ────────────────────────────────────────────────────
[http3]
enabled = false
listen_addr = "0.0.0.0:443"
# cert_pem = "/etc/prx-waf/tls/cert.pem"
# key_pem  = "/etc/prx-waf/tls/key.pem"

# ── Phase 5: Security Hardening ───────────────────────────────────────────────
[security]
# List of IPs/CIDRs allowed to access the admin API.  Empty = allow all.
admin_ip_allowlist = []
# Maximum request body size (bytes).  Default 10 MB.
max_request_body_bytes = 10485760
# Per-IP rate limit for the admin API (req/s).  0 = disabled.
api_rate_limit_rps = 0
# CORS origins for admin API.  Empty = allow all.
cors_origins = []

# ── Admin panel runtime TOML (shadow mode, risk bands, honeypots, …) ─────────
[panel]
config_path = "waf-panel.toml"

# ── FR-004 rate-limit subsystem (YAML, hot-reload) ───────────────────────────
# Omit `config_path` to leave the subsystem inert.
[rate_limit]
config_path = "configs/rate-limit.yaml"

# ── Example host configuration ────────────────────────────────────────────────
# [[hosts]]
# host = "example.com"
# port = 80
# remote_host = "127.0.0.1"
# remote_port = 8080
# guard_status = true

# ── Cluster Configuration (disabled by default — opt-in) ──────────────────────
# Remove the leading '#' characters from the [cluster] section to enable.
#
# [cluster]
# # Enable clustering. Default: false — zero behavior change for standalone deployments.
# enabled = false
#
# # Unique node identifier. Auto-generated from hostname+uuid suffix if empty.
# node_id = ""
#
# # Role assignment. "auto" participates in leader election.
# # Values: "auto" | "main" | "worker"
# role = "auto"
#
# # QUIC listen address for inter-node communication.
# listen_addr = "0.0.0.0:16851"
#
# # Static seed nodes. At least one reachable seed required to join a cluster.
# # seeds = ["10.0.0.1:16851", "10.0.0.2:16851"]
# seeds = []
#
# [cluster.crypto]
# ca_cert   = "/app/certs/cluster-ca.pem"
# node_cert = "/app/certs/node.pem"
# node_key  = "/app/certs/node.key"
# # Auto-generate CA and node certs on first startup (required for initial main).
# auto_generate       = true
# ca_validity_days    = 3650   # 10 years
# node_validity_days  = 365    # 1 year
# renewal_before_days = 7      # auto-renew 7 days before expiry
#
# [cluster.sync]
# rules_interval_secs        = 10    # periodic rule version check
# config_interval_secs       = 30
# events_batch_size          = 100   # flush event batch at this count
# events_flush_interval_secs = 5     # flush even if batch not full
# stats_interval_secs        = 10
# events_queue_size          = 10000 # drop oldest if worker falls behind
#
# [cluster.election]
# timeout_min_ms        = 150    # random election timeout range (ms)
# timeout_max_ms        = 300
# heartbeat_interval_ms = 50     # main → workers heartbeat interval
# phi_suspect           = 8.0
# phi_dead              = 12.0
#
# [cluster.health]
# check_interval_secs   = 5
# max_missed_heartbeats = 3

# ── VictoriaLogs managed sidecar ─────────────────────────────────────────────
# `prx-waf` runs `victoria-logs` as an in-process child for centralised audit +
# tracing log storage. The listener MUST stay on a loopback address —
# VictoriaLogs has no built-in auth, so external access is funnelled through
# the WAF /api/v1/logs proxy with the existing JWT.
#
# Set `enabled = false` to turn the entire pipeline into a no-op (no download,
# no child process, no audit ingest).
[victoria_logs]
enabled = true
binary_path = "/var/lib/prx-waf/victoria-logs/victoria-logs"
storage_data_path = "/var/lib/prx-waf/victoria-logs/data"
listen_addr = "127.0.0.1:9428"     # loopback ONLY — validated at load time
retention_period = "30d"
max_disk_space_bytes = "100GiB"
min_free_disk_bytes = "1GiB"
version = "v1.50.0"
auto_install = true                # download from upstream if missing
batch_size = 100                   # entries per ingest batch
flush_interval_ms = 1000           # flush deadline regardless of batch fill
channel_capacity = 10000           # drop-oldest threshold for the buffer

# ── Community Integration ─────────────────────────────────────────────────────
# Share threat intelligence with the OpenPRX community network.
# Enable to report detected attacks and receive the community blocklist.
# Run `prx-waf community enroll` first to obtain machine_id and api_key.
#
# [community]
# enabled = false
# server_url = "https://community.openprx.dev"
# api_key = ""           # Obtained from: prx-waf community enroll
# machine_id = ""        # Obtained from: prx-waf community enroll
# public_key = ""        # Ed25519 hex (64 chars). If set but invalid, init is refused.
# batch_size = 50        # Number of signals to buffer before flushing
# flush_interval_secs = 30   # Flush buffer even when batch_size not reached
# sync_interval_secs = 300   # Blocklist sync interval (default: 5 minutes)
