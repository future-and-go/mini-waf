# PRX-WAF configuration used by the nightly E2E test suite.
# Routes traffic to the kennethreitz/httpbin upstream which echoes any
# request back, so the E2E suite can assert proxy behaviour and rule
# blocking deterministically.

[proxy]
listen_addr     = "0.0.0.0:80"
listen_addr_tls = "0.0.0.0:443"

[api]
listen_addr = "0.0.0.0:9527"

[storage]
database_url    = "postgresql://prx_waf:prx_waf@postgres:5432/prx_waf"
max_connections = 10

[cache]
enabled          = true
max_size_mb      = 64
default_ttl_secs = 30
max_ttl_secs     = 300

[http3]
enabled     = false
listen_addr = "0.0.0.0:443"

[security]
admin_ip_allowlist     = []
max_request_body_bytes = 10485760
api_rate_limit_rps     = 0
cors_origins           = []

# ── Upstream: httpbin echo server (deterministic for assertions) ─────────────
# The host header used by the test scripts is "e2e.local" — see run-*.sh.
[[hosts]]
host         = "e2e.local"
port         = 80
remote_host  = "httpbin"
remote_port  = 80
guard_status = true

# Allow plain localhost requests for the rules / gateway suites that hit
# 127.0.0.1:16880 directly without a custom Host header.
[[hosts]]
host         = "localhost"
port         = 80
remote_host  = "httpbin"
remote_port  = 80
guard_status = true
