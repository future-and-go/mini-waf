services:
  # ── PostgreSQL database ──────────────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: prx-waf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prx_waf
      POSTGRES_PASSWORD: prx_waf
      POSTGRES_DB: prx_waf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prx_waf -d prx_waf"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "15432:5432"

  # ── Standalone Valkey (cache backend = "standalone" in configs/default.toml) ─
  # TCP service; WAF connects via seeds = ["valkey:6379"] on the Compose network.
  valkey:
    image: docker.io/valkey/valkey:8-alpine
    container_name: prx-waf-valkey
    restart: unless-stopped
    command: >
      valkey-server
        --appendonly no
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --protected-mode no
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "16379:6379"

  # ── TLS init — generates self-signed cert into waf_tls volume if not present ─
  tls-init:
    image: docker.io/library/alpine:latest
    volumes:
      - waf_tls:/certs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache openssl >/dev/null 2>&1
        if [ ! -f /certs/cert.pem ] || [ ! -f /certs/key.pem ]; then
          openssl req -x509 -newkey rsa:2048 -keyout /certs/key.pem -out /certs/cert.pem -days 3650 -nodes -subj '/CN=localhost/O=prx-waf/C=VN'
          chmod 600 /certs/key.pem
          echo 'TLS certs generated.'
        else
          echo 'TLS certs already exist, skipping.'
        fi
    restart: "no"

  # ── PRX-WAF ──────────────────────────────────────────────────────────────────
  prx-waf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prx-waf
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      tls-init:
        condition: service_completed_successfully
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-with-a-long-random-secret}
      DATABASE_URL: postgresql://prx_waf:prx_waf@postgres:5432/prx_waf
      # Cache backend: override the "memory" default in configs/default.toml so
      # the Compose stack uses the bundled `valkey` service automatically.
      # Valid values: memory | embedded | standalone | cluster (see docs/valkey-cache-guide.md §3.1).
      CACHE_BACKEND: ${CACHE_BACKEND:-standalone}
      RUST_LOG: ${RUST_LOG:-info}
      # Tell rustls-native-certs exactly where the Debian CA bundle is.
      # openssl_probe sometimes fails to locate it in slim Docker images.
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    volumes:
      - ./configs:/app/configs      # rw: waf-panel.toml is written by the admin API
      - ./rules:/app/rules:ro
      - waf_tls:/etc/prx-waf/tls:ro               # TLS cert/key — populated by tls-init service
      - waf_certs:/app/certs
      - waf_data:/app/data                          # geoip xdb + admin TLS cert (persisted at data/admin-tls/)
      - vlogs_data:/var/lib/prx-waf/victoria-logs   # binary + log partitions (persistent)
    ports:
      - "16880:80"    # HTTP proxy
      - "16843:443"   # HTTPS proxy
      - "16827:9527"  # Management API + Admin Panel (embedded React/Refine SPA at /ui/ — served over HTTPS)
    healthcheck:
      # Admin API now serves HTTPS with a self-signed cert — use -k/--insecure.
      test: ["CMD-SHELL", "curl -ksf https://localhost:9527/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    cap_add:
      - NET_ADMIN      # required for Pingora raw socket support
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # NOTE: The admin panel (web/admin-panel — React/Refine/AntD) is now embedded
  # directly into the prx-waf binary via `rust_embed` and served at
  # https://localhost:16827/ui/. No standalone nginx container is needed.
  # The self-signed admin TLS certificate is auto-generated on first startup
  # and persisted in the `admin_tls_data` volume.

  # ── OWASP Juice Shop (test target — DELIBERATELY VULNERABLE) ─────────────────
  # Reverse-proxied through prx-waf to exercise the WAF rules end-to-end.
  # Reachable inside the compose network as `juice-shop:3000`. The host port
  # 13000 is exposed only as a fallback / direct-access escape hatch — for
  # WAF testing always go through prx-waf (http://localhost:16880 with the
  # appropriate Host header, e.g. `Host: juice.local`).
  #
  # ⚠️ Do NOT expose this container publicly — Juice Shop is intentionally
  # exploitable and is meant to live behind a WAF on a trusted network only.
  juice-shop:
    image: docker.io/bkimminich/juice-shop:latest
    container_name: juice-shop
    restart: unless-stopped
    ports:
      - "13000:3000"   # direct access (bypassing WAF) — comment out to lock down
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/rest/admin/application-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  waf_tls:
    driver: local
  waf_certs:
    driver: local
  waf_data:
    driver: local
  vlogs_data:
    driver: local