name: Coverage

on:
  push:
    branches: [main, develop, release/stg]
  pull_request:
    branches: [main, release/stg]

concurrency:
  group: coverage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Make panics and `?`-chains print full backtraces in coverage logs so a
  # CI failure surfaces enough context to debug without having to re-run with
  # a separate trigger commit.
  RUST_BACKTRACE: full

jobs:
  coverage:
    name: Coverage (${{ matrix.crate }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prx_waf
          POSTGRES_PASSWORD: prx_waf
          POSTGRES_DB: prx_waf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prx_waf"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - { crate: waf-common,  floor: 88 }
          - { crate: waf-storage, floor: 84 }
          - { crate: waf-cluster, floor: 82 }
          - { crate: waf-api,     floor: 80 }
          - { crate: gateway,     floor: 85 }
          - { crate: waf-engine,  floor: 80 }
          - { crate: prx-waf,     floor: 5 }

    steps:
      - uses: actions/checkout@v5

      # The ubuntu-latest runner ships with ~14 GB free on /. cargo llvm-cov
      # compiles the vendored pingora workspace into target/llvm-cov-target
      # for every crate, and waf-engine + waf-api have repeatedly hit
      # "No space left on device" mid-run. Free ~20 GB by removing toolchains
      # we never touch (.NET, Android SDK, Haskell GHC, Boost) before any
      # cargo step grows target/.
      - name: Free disk space (avoid llvm-cov "No space left on device")
        run: |
          set -euxo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-}" || true
          df -h /

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage-${{ matrix.crate }}

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Enforce coverage floor
        run: bash .github/scripts/coverage-check.sh ${{ matrix.crate }} ${{ matrix.floor }}

      - name: Disk usage after coverage
        if: always()
        run: df -h /
