name: CI

on:
  push:
    branches: [main, develop, release/stg]
  pull_request:
    branches: [main, release/stg]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Full backtraces on test panics + `?`-chain unwraps so CI failures are
  # debuggable from the run log alone, no re-run needed.
  RUST_BACKTRACE: full

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Unused deps
        run: |
          cargo install cargo-machete --locked
          cargo machete

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        # `--nocapture` surfaces println!/dbg! output from a failing test
        # directly in the CI log so contributors do not have to re-run
        # locally just to see diagnostic output.
        run: cargo test --workspace --all-features -- --nocapture

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --workspace --release

