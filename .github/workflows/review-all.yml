name: Review All

# Comprehensive verification — fmt, strict clippy, audit, coverage gate, e2e.
# Heavier and slower than the default CI; trigger manually when needed
# (e.g. before a release, or to verify a branch end-to-end without burning
# CI minutes on every push).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to validate (default: current)'
        required: false
        type: string
  # Auto-run on ci/** branches so the workflow itself can be verified
  # before merging into main. Once merged, the workflow_dispatch button
  # appears in the Actions UI for on-demand runs against any ref.
  push:
    branches:
      - 'ci/**'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-strict:
    name: clippy -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: review-all
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  audit:
    name: cargo-audit (CVE scan)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --deny warnings

  test:
    name: workspace tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: review-all
      - run: cargo test --workspace --all-features --exclude waf-cluster

  coverage:
    name: coverage ${{ matrix.crate }}
    runs-on: ubuntu-latest
    # Per-crate floors mirror .github/workflows/coverage.yml — the enforced
    # baseline is "no regression", not aspirational 90%. Lift floors as
    # coverage improves so the gate ratchets upward over time.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { crate: waf-common,  floor: 88 }
          - { crate: waf-storage, floor: 82 }
          - { crate: waf-cluster, floor: 82 }
          - { crate: waf-api,     floor: 78 }
          - { crate: gateway,     floor: 85 }
          - { crate: waf-engine,  floor: 80 }
          - { crate: prx-waf,     floor: 5  }
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prx_waf
          POSTGRES_PASSWORD: prx_waf
          POSTGRES_DB: prx_waf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prx_waf"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: review-all-cov-${{ matrix.crate }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Enforce coverage floor
        run: bash .github/scripts/coverage-check.sh ${{ matrix.crate }} ${{ matrix.floor }}

  e2e-circuit-breaker:
    name: e2e — FR-039 circuit breaker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive
      - name: Check e2e harness presence
        id: harness
        run: |
          if [ -f tests/e2e/circuit-breaker/docker-compose.yml ]; then
            echo "present=true"  >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/e2e/circuit-breaker/ not present on this ref; skipping e2e."
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.harness.outputs.present == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.harness.outputs.present == 'true'
        with:
          shared-key: review-all-e2e
      - name: Install build deps
        if: steps.harness.outputs.present == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake build-essential clang
      - name: Build prx-waf release
        if: steps.harness.outputs.present == 'true'
        run: cargo build --release -p prx-waf
      - name: Ensure data/ + web/admin-panel/dist exist
        if: steps.harness.outputs.present == 'true'
        run: |
          mkdir -p data
          mkdir -p web/admin-panel/dist
          [ -f web/admin-panel/dist/index.html ] || echo "<html><body>placeholder</body></html>" > web/admin-panel/dist/index.html
      - name: Run e2e compose
        if: steps.harness.outputs.present == 'true'
        working-directory: tests/e2e/circuit-breaker
        run: docker compose up --abort-on-container-exit --exit-code-from asserter
      - name: Show WAF logs on failure
        if: failure() && steps.harness.outputs.present == 'true'
        working-directory: tests/e2e/circuit-breaker
        run: docker compose logs waf
      - name: Teardown
        if: always() && steps.harness.outputs.present == 'true'
        working-directory: tests/e2e/circuit-breaker
        run: docker compose down --volumes

  summary:
    name: review-all summary
    runs-on: ubuntu-latest
    needs: [fmt, clippy-strict, test, coverage, e2e-circuit-breaker]
    if: always()
    steps:
      - name: Aggregate status
        run: |
          echo "fmt:               ${{ needs.fmt.result }}"
          echo "clippy-strict:     ${{ needs.clippy-strict.result }}"
          echo "test:              ${{ needs.test.result }}"
          echo "coverage:          ${{ needs.coverage.result }}"
          echo "e2e:               ${{ needs.e2e-circuit-breaker.result }}"
          for r in "${{ needs.fmt.result }}" "${{ needs.clippy-strict.result }}" \
                   "${{ needs.test.result }}" "${{ needs.coverage.result }}" \
                   "${{ needs.e2e-circuit-breaker.result }}"; do
            if [ "$r" != "success" ]; then
              echo "::error::review-all has failing jobs"
              exit 1
            fi
          done
          echo "review-all: ALL GREEN"
