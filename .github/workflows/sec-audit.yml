name: Sec Audit

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
      - '.cargo/audit.toml'
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
      - '.cargo/audit.toml'
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      # Run cargo-audit directly instead of `rustsec/audit-check@v2`. That
      # action publishes findings via the GitHub Checks API, which is NOT
      # available to workflows running on a fork (GitHub returns
      # "Resource not accessible by integration"). Forks can still see the
      # vulnerability list in the workflow log, and the audit.toml ignore
      # list keeps the exit code deterministic.
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo-audit
        # `--ignore` advisories come from .cargo/audit.toml automatically.
        # `--deny warnings` would be too strict given how many transitive
        # advisories we already silence in audit.toml; let the toml drive.
        run: cargo audit

  deny:
    name: License & Supply Chain
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    # advisories check is informational only — we already track the upstream
    # ignore list in deny.toml. bans/licenses/sources MUST stay green.
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
          arguments: --all-features
