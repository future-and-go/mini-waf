# Audit policy for prx-waf
# Advisories ignored here are from upstream transitive dependencies
# that we cannot directly control.

[advisories]
# RUSTSEC-2023-0071: rsa Marvin Attack via sqlx-mysql
# sqlx-mysql is an optional dependency of sqlx and is NOT activated in this project
# (prx-waf only uses postgres feature, default-features = false).
# It appears in Cargo.lock only as a version record for the optional dep, never compiled.
# cargo tree -i rsa returns nothing; no fix is available upstream (patched = []).
#
# RUSTSEC-2024-0437: protobuf 2.28.0 recursive parsing crash — via pingora-core -> prometheus -> protobuf
# Waiting for Cloudflare/pingora to upgrade prometheus or switch to prost
#
# RUSTSEC-2025-0069: daemonize 0.5.0 unmaintained — via pingora-core
# No alternative available until pingora drops this dependency
#
# RUSTSEC-2024-0388: derivative 2.2.0 unmaintained — via pingora-core
# No alternative available until pingora drops this dependency
ignore = [
    "RUSTSEC-2023-0071",
    "RUSTSEC-2024-0437",
    "RUSTSEC-2025-0069",
    "RUSTSEC-2024-0388",
]
informational_warnings = ["unmaintained"]
severity_threshold = "low"

[database]
fetch = true
stale = false

[output]
deny = ["unmaintained"]
format = "terminal"
quiet = false
show_tree = true

[yanked]
enabled = true
update_index = true
