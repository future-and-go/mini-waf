version: "3.9"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  Security & Performance Test Stack                                          │
# │                                                                             │
# │  Flow:  ZAP ──► mini-waf (prx-waf) ──► juice-shop                          │
# │                                                                             │
# │  Start:   docker compose -f docker-compose.test.yml up -d                  │
# │  Scan:    docker compose -f docker-compose.test.yml --profile scan up zap-scan │
# │  Bench:   docker compose -f docker-compose.test.yml --profile bench up k6  │
# │                                                                             │
# │  Ports:                                                                     │
# │    16880  → mini-waf HTTP  (WAF-protected Juice Shop)                       │
# │    13000  → juice-shop     (direct, bypass WAF — verify blocks)             │
# │    16827  → mini-waf Admin UI  (admin / admin123)                           │
# │    18080  → ZAP API/UI     http://localhost:18080/UI (apikey: zapkey123)    │
# └─────────────────────────────────────────────────────────────────────────────┘

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     prx_waf
      POSTGRES_PASSWORD: prx_waf
      POSTGRES_DB:       prx_waf
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U prx_waf -d prx_waf"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - test-net

  # ── Target: OWASP Juice Shop ──────────────────────────────────────────────────
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop
    restart: unless-stopped
    environment:
      - NODE_ENV=unsafe          # disables security headers so WAF rules are clearly visible
    ports:
      - "13000:3000"             # direct access — use to compare WAF-blocked vs unblocked
    networks:
      - test-net

  # ── WAF: PRX-WAF (reverse proxy in front of juice-shop) ──────────────────────
  prx-waf:
    build:
      context:    .
      dockerfile: Dockerfile
    container_name: test-prx-waf
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      juice-shop:
        condition: service_started
    environment:
      JWT_SECRET:   test-jwt-secret-do-not-use-in-production
      DATABASE_URL: postgresql://prx_waf:prx_waf@postgres:5432/prx_waf
    volumes:
      - ./configs/test.toml:/app/configs/default.toml:ro   # routes → juice-shop
      - ./rules:/app/rules:ro
      - test_waf_certs:/app/certs
    ports:
      - "16880:80"    # WAF-protected Juice Shop (ZAP scan target)
      - "16827:9527"  # Admin UI + API
    healthcheck:
      test:          ["CMD-SHELL", "curl -sf http://localhost:9527/health || exit 1"]
      interval:      30s
      timeout:       10s
      start_period:  60s
      retries:       5
    cap_add:
      - NET_ADMIN
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - test-net

  # ── Scanner: OWASP ZAP (daemon mode — interactive API) ───────────────────────
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap
    restart: unless-stopped
    depends_on:
      prx-waf:
        condition: service_healthy
    command: >
      zap.sh -daemon
      -host 0.0.0.0 -port 8080
      -config api.key=zapkey123
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.threadPerHost=5
      -config connection.timeoutInSecs=30
    ports:
      - "18080:8080"   # ZAP REST API + Web UI
    volumes:
      - zap_reports:/zap/reports
      - zap_data:/home/zap/.ZAP
    networks:
      - test-net
    user: zap

  # ── Auto Full Scan (run with: --profile scan) ─────────────────────────────────
  # Runs ZAP full active scan and saves HTML + JSON reports to ./zap-reports/
  #
  # Usage:
  #   docker compose -f docker-compose.test.yml --profile scan up zap-scan
  zap-scan:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap-scan
    profiles:
      - scan
    depends_on:
      prx-waf:
        condition: service_healthy
    command: >
      zap-full-scan.py
      -t http://test-prx-waf:80
      -r /zap/reports/full-scan-report.html
      -J /zap/reports/full-scan-report.json
      -l WARN
      -z "-config api.key=zapkey123"
    volumes:
      - ./zap-reports:/zap/reports
    networks:
      - test-net
    user: zap

  # ── Performance Benchmark: k6 (run with: --profile bench) ────────────────────
  # Sends 100 concurrent users for 60s, reports RPS / latency / error rate.
  #
  # Usage:
  #   docker compose -f docker-compose.test.yml --profile bench up k6
  k6:
    image: grafana/k6:latest
    container_name: k6-bench
    profiles:
      - bench
    depends_on:
      prx-waf:
        condition: service_healthy
    command: run /scripts/bench.js
    environment:
      TARGET_URL: http://test-prx-waf:80
    volumes:
      - ./scripts/k6-bench.js:/scripts/bench.js:ro
    networks:
      - test-net

networks:
  test-net:
    name: mini-waf-test
    driver: bridge

volumes:
  test_postgres_data:
    driver: local
  test_waf_certs:
    driver: local
  zap_reports:
    driver: local
  zap_data:
    driver: local
