kind: custom_rule_v1
id: API-AUTH-001
name: JWT None Algorithm Attack
enabled: true
action: block
pattern: "(?i)eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.(?:\\s*$|,|\\s)"
pattern_field: headers
category: broken-authentication
severity: critical
paranoia: 1
tags: [owasp-api, broken-auth, jwt, api2-2023]
reference: "https://portswigger.net/web-security/jwt/algorithm-confusion"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-002
name: JWT Algorithm None in Header (Base64 decoded pattern)
enabled: true
action: block
pattern: "(?i)(?:eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0|eyJhbGciOiJOT05FIiwidHlwIjoiSldUIn0|eyJhbGciOiJub25lIn0)"
pattern_field: headers
category: broken-authentication
severity: critical
paranoia: 1
tags: [owasp-api, broken-auth, jwt, none-algorithm, api2-2023]
reference: "https://auth0.com/blog/critical-vulnerabilities-in-json-web-token-libraries/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-003
name: JWT None Algorithm via alg Claim Manipulation
enabled: true
action: block
pattern: "(?i)\"alg\"\\s*:\\s*\"(?:none|NONE|None|nOnE)\""
pattern_field: all
category: broken-authentication
severity: critical
paranoia: 1
tags: [owasp-api, broken-auth, jwt, none-algorithm, api2-2023]
reference: "https://portswigger.net/web-security/jwt"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-004
name: JWT Signature Bypass - Empty Signature Segment
enabled: true
action: block
pattern: "(?i)(?:Bearer|JWT)\\s+eyJ[a-zA-Z0-9_-]+\\.eyJ[a-zA-Z0-9_-]+\\.$"
pattern_field: headers
category: broken-authentication
severity: critical
paranoia: 1
tags: [owasp-api, broken-auth, jwt, signature-bypass, api2-2023]
reference: "https://portswigger.net/web-security/jwt"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-005
name: JWT HS256/RS256 Algorithm Confusion Attack
enabled: true
action: log
pattern: "(?i)\"alg\"\\s*:\\s*\"(?:hs(?:256|384|512)|rs(?:256|384|512)|es(?:256|384|512)|ps(?:256|384|512))\""
pattern_field: all
category: broken-authentication
severity: high
paranoia: 2
tags: [owasp-api, broken-auth, jwt, algorithm-confusion, api2-2023]
reference: "https://portswigger.net/web-security/jwt/algorithm-confusion"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-006
name: Bearer Token Leaked in URL Query String
enabled: true
action: log
pattern: "(?i)(?:^|&)(?:access_token|bearer_token|auth_token|id_token|jwt_token)=(?:eyJ[a-zA-Z0-9_-]+\\.){2}[a-zA-Z0-9_-]+"
pattern_field: query
category: broken-authentication
severity: high
paranoia: 1
tags: [owasp-api, broken-auth, token-leakage, api2-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa2-broken-authentication/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-007
name: API Key Exposed in URL Query Parameter
enabled: true
action: log
pattern: "(?i)(?:^|&)(?:api[_-]?key|apikey|app[_-]?key|client[_-]?secret|access[_-]?key|secret[_-]?key)=[^&]{8,}"
pattern_field: query
category: broken-authentication
severity: medium
paranoia: 1
tags: [owasp-api, broken-auth, api-key-exposure, api2-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa2-broken-authentication/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-008
name: Missing Authorization Header on Sensitive Endpoint
enabled: true
action: log
pattern: "(?i)/(?:api/v[0-9]+/)?(?:admin|users?/(?:me|profile|settings)|account|billing|payment|dashboard|secrets?|keys?|tokens?|credentials?)(?:/|$|\\?)"
pattern_field: path
category: broken-authentication
severity: medium
paranoia: 3
tags: [owasp-api, broken-auth, missing-auth, api2-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa2-broken-authentication/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-009
name: Brute Force Login - High Frequency Login Endpoint Access
enabled: true
action: log
pattern: "(?i)/(?:api/v[0-9]+/)?(?:auth/(?:login|signin|token|password)|login|signin|authenticate|oauth/token|api/login|user/login)(?:/|$|\\?)"
pattern_field: path
category: broken-authentication
severity: high
paranoia: 1
tags: [owasp-api, broken-auth, brute-force, api2-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa2-broken-authentication/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-010
name: Credential Stuffing - Suspicious Login Payload Pattern
enabled: true
action: log
pattern: "(?i)\"(?:username|email|login)\"\\s*:\\s*\"[^\"]{3,}\".*\"(?:password|passwd|pass|pwd)\"\\s*:\\s*\"[^\"]{3,}\""
pattern_field: body
category: broken-authentication
severity: high
paranoia: 2
tags: [owasp-api, broken-auth, credential-stuffing, api2-2023]
reference: "https://owasp.org/www-community/attacks/Credential_stuffing"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-011
name: OAuth Token Endpoint Abuse - Suspicious Grant Type
enabled: true
action: log
pattern: "(?i)grant_type=(?:password|client_credentials|urn:ietf:params:oauth)"
pattern_field: body
category: broken-authentication
severity: high
paranoia: 2
tags: [owasp-api, broken-auth, oauth, api2-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa2-broken-authentication/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-012
name: JWT kid Header Injection (SQL/Path Traversal)
enabled: true
action: block
pattern: "(?i)\"kid\"\\s*:\\s*\"(?:[^\"]*(?:--|;|union|select|insert|drop|delete|update|'|/\\.\\./|\\.\\.\\\\)[^\"]*)\""
pattern_field: headers
category: broken-authentication
severity: critical
paranoia: 1
tags: [owasp-api, broken-auth, jwt, kid-injection, api2-2023]
reference: "https://portswigger.net/web-security/jwt"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-013
name: JWT jwk Header Injection (Embedded Public Key)
enabled: true
action: block
pattern: "(?i)\"jwk\"\\s*:\\s*\\{[^}]*\"(?:kty|n|e|x|y|crv)\"\\s*:"
pattern_field: headers
category: broken-authentication
severity: critical
paranoia: 1
tags: [owasp-api, broken-auth, jwt, jwk-injection, api2-2023]
reference: "https://portswigger.net/web-security/jwt"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-014
name: API Password Reset Token in URL
enabled: true
action: log
pattern: "(?i)(?:^|&)(?:reset_token|password_reset|forgot_token|verify_token|activation_token)=[a-zA-Z0-9_-]{16,}"
pattern_field: query
category: broken-authentication
severity: medium
paranoia: 1
tags: [owasp-api, broken-auth, password-reset, api2-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa2-broken-authentication/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-AUTH-015
name: HTTP Basic Auth Credentials Exposed in URL
enabled: true
action: block
pattern: "(?i)https?://[a-zA-Z0-9_.-]+:[^@/]{3,}@"
pattern_field: path
category: broken-authentication
severity: high
paranoia: 1
tags: [owasp-api, broken-auth, basic-auth-exposure, api2-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa2-broken-authentication/"
metadata:
  source: prx-waf community rules
