kind: custom_rule_v1
id: API-MASS-001
name: Mass Assignment - isAdmin Flag in Request Body
enabled: true
action: block
pattern: "(?i)\"is[_-]?(?:admin|superuser|root|privileged|staff|operator)\"\\s*:\\s*(?:true|1|\"true\"|\"1\"|\"yes\")"
pattern_field: body
category: mass-assignment
severity: critical
paranoia: 1
tags: [owasp-api, mass-assignment, privilege-escalation, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-MASS-002
name: Mass Assignment - Role Field Manipulation
enabled: true
action: block
pattern: "(?i)\"role(?:s|_id|_name|_type)?\"\\s*:\\s*(?:\"(?:admin|superadmin|root|operator|moderator|staff|owner|system)\"|0|\\[\"admin)"
pattern_field: body
category: mass-assignment
severity: critical
paranoia: 1
tags: [owasp-api, mass-assignment, role-manipulation, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-MASS-003
name: Mass Assignment - Privileges/Permissions Object in Body
enabled: true
action: log
pattern: "(?i)\"(?:privilege[sd]?|permission[sd]?|access[_-]?level|user[_-]?type|account[_-]?type|plan|subscription[_-]?tier)\"\\s*:"
pattern_field: body
category: mass-assignment
severity: high
paranoia: 1
tags: [owasp-api, mass-assignment, privilege-escalation, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-MASS-004
name: Mass Assignment - Internal User ID Override
enabled: true
action: log
pattern: "(?i)\"(?:_id|user_id|account_id|owner_id|creator_id|created_by)\"\\s*:\\s*(?:\"[0-9a-f]{24,}\"|-?[0-9]{1,12})"
pattern_field: body
category: mass-assignment
severity: high
paranoia: 2
tags: [owasp-api, mass-assignment, id-override, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-MASS-005
name: Mass Assignment - Verified/Approved Status Override
enabled: true
action: block
pattern: "(?i)\"(?:is_?verified|is_?approved|is_?active|is_?enabled|is_?confirmed|email_verified|phone_verified|kyc_verified|identity_verified)\"\\s*:\\s*(?:true|1|\"true\")"
pattern_field: body
category: mass-assignment
severity: high
paranoia: 1
tags: [owasp-api, mass-assignment, status-override, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-MASS-006
name: Mass Assignment - Balance/Credit Field Manipulation
enabled: true
action: log
pattern: "(?i)\"(?:balance|credit[sd]?|coins?|points?|wallet|account_balance|cash|funds?|tokens?)\"\\s*:\\s*-?[0-9]{4,}"
pattern_field: body
category: mass-assignment
severity: critical
paranoia: 2
tags: [owasp-api, mass-assignment, financial-manipulation, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-MASS-007
name: Mass Assignment - Internal System Fields Override
enabled: true
action: log
pattern: "(?i)\"(?:created_at|updated_at|deleted_at|last_login|password_hash|hashed_password|salt|secret_key|internal_id|legacy_id)\"\\s*:"
pattern_field: body
category: mass-assignment
severity: high
paranoia: 2
tags: [owasp-api, mass-assignment, internal-fields, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-MASS-008
name: Mass Assignment - API Rate Limit Override Attempt
enabled: true
action: block
pattern: "(?i)\"(?:rate_limit|api_limit|max_requests?|quota|throttle_limit|tier_limit)\"\\s*:\\s*(?:0|-1|99999|null|false)"
pattern_field: body
category: mass-assignment
severity: high
paranoia: 2
tags: [owasp-api, mass-assignment, rate-limit-bypass, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-MASS-009
name: Mass Assignment - Payment/Subscription Plan Override
enabled: true
action: log
pattern: "(?i)\"(?:plan|subscription|pricing_tier|product_tier|license_type|license_key)\"\\s*:\\s*\"(?:enterprise|premium|pro|platinum|gold|unlimited|free|trial)\""
pattern_field: body
category: mass-assignment
severity: critical
paranoia: 2
tags: [owasp-api, mass-assignment, subscription-abuse, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-MASS-010
name: Mass Assignment - Multiple Sensitive Fields Batch
enabled: true
action: block
pattern: "(?i)(?:\"is[_-]?admin\"[^}]{0,200}\"role\"[^}]{0,200}|\"role\"[^}]{0,200}\"is[_-]?admin\"[^}]{0,200}|\"permission[sd]?\"[^}]{0,200}\"is[_-]?admin\")"
pattern_field: body
category: mass-assignment
severity: critical
paranoia: 1
tags: [owasp-api, mass-assignment, privilege-escalation, api3-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
metadata:
  source: prx-waf community rules
