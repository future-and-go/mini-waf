kind: custom_rule_v1
id: API-RATE-001
name: GraphQL Batching Attack - Array of Multiple Queries
enabled: true
action: block
pattern: "(?i)^\\s*\\[\\s*\\{[^}]*\"query\"\\s*:[^}]*\\}\\s*,\\s*\\{[^}]*\"query\""
pattern_field: body
category: rate-abuse
severity: high
paranoia: 1
tags: [owasp-api, graphql, batching-attack, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-002
name: GraphQL Batching Attack - Large Batch Count
enabled: true
action: block
pattern: "(?i)(?:\"query\"\\s*:[^,}]+,\\s*){10,}"
pattern_field: body
category: rate-abuse
severity: critical
paranoia: 1
tags: [owasp-api, graphql, batching-attack, dos, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-003
name: Pagination Abuse - Extremely Large Page Size
enabled: true
action: block
pattern: "(?i)(?:^|&)(?:limit|per_page|page_size|count|size|take|n|rows)=(?:[0-9]{5,}|[1-9][0-9]{3,})"
pattern_field: query
category: rate-abuse
severity: high
paranoia: 1
tags: [owasp-api, rate-abuse, pagination-abuse, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-004
name: Bulk/Batch Endpoint Abuse - Large Array in Body
enabled: true
action: block
pattern: "(?i)(?:\\{[^{}]*\\}\\s*,\\s*){50,}"
pattern_field: body
category: rate-abuse
severity: high
paranoia: 2
tags: [owasp-api, rate-abuse, bulk-abuse, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-005
name: Bulk Operation Endpoint Access
enabled: true
action: log
pattern: "(?i)/(?:api/v[0-9]+/)?(?:bulk|batch|mass|multi|parallel|concurrent)/(?:create|update|delete|send|process|import|export)"
pattern_field: path
category: rate-abuse
severity: medium
paranoia: 2
tags: [owasp-api, rate-abuse, bulk-endpoint, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-006
name: GraphQL Nested Object Depth Abuse
enabled: true
action: block
pattern: "(?i)\\{[^{}]*\\{[^{}]*\\{[^{}]*\\{[^{}]*\\{[^{}]*\\{[^{}]*\\{"
pattern_field: body
category: rate-abuse
severity: high
paranoia: 1
tags: [owasp-api, graphql, depth-limit, dos, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-007
name: API Resource Export Abuse - Large Offset
enabled: true
action: log
pattern: "(?i)(?:^|&)offset=[0-9]{7,}"
pattern_field: query
category: rate-abuse
severity: medium
paranoia: 2
tags: [owasp-api, rate-abuse, pagination-abuse, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-008
name: Bulk Email/SMS Send Endpoint
enabled: true
action: log
pattern: "(?i)/(?:api/v[0-9]+/)?(?:email|sms|notification|message|push)/(?:bulk|batch|mass|broadcast|blast|campaign)(?:/|$|\\?)"
pattern_field: path
category: rate-abuse
severity: high
paranoia: 1
tags: [owasp-api, rate-abuse, notification-abuse, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-009
name: File Upload Size Abuse - Chunked Upload Manipulation
enabled: true
action: log
pattern: "(?i)Content-Range:\\s*bytes\\s+[0-9]+-[0-9]+/(?:[0-9]{10,}|\\*)"
pattern_field: headers
category: rate-abuse
severity: medium
paranoia: 2
tags: [owasp-api, rate-abuse, upload-abuse, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-010
name: GraphQL Fragment Abuse - Circular Fragment
enabled: true
action: block
pattern: "(?i)fragment\\s+[a-zA-Z_][a-zA-Z0-9_]*\\s+on\\s+[a-zA-Z_][a-zA-Z0-9_]*\\s*\\{[^}]*\\.\\.\\."
pattern_field: body
category: rate-abuse
severity: critical
paranoia: 1
tags: [owasp-api, graphql, circular-fragment, dos, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-011
name: API Zip Bomb via Multipart Upload
enabled: true
action: log
pattern: "(?i)Content-Type:\\s*(?:application/zip|application/x-zip|application/x-gzip|application/x-tar|application/x-bzip2)"
pattern_field: headers
category: rate-abuse
severity: high
paranoia: 2
tags: [owasp-api, rate-abuse, zip-bomb, api4-2023]
reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: API-RATE-012
name: Regex Injection for ReDoS via API
enabled: true
action: block
pattern: "(?i)(?:\\(a+\\)\\+|\\(a\\*\\)\\*|\\(a\\|a\\)\\*|\\(?[a-zA-Z]\\+\\)\\+\\$|\\([^)]+\\+\\)\\+[a-zA-Z])"
pattern_field: all
category: rate-abuse
severity: high
paranoia: 2
tags: [owasp-api, rate-abuse, redos, regex-dos, api4-2023]
reference: "https://owasp.org/www-community/attacks/Regular_expression_Denial_of_Service_-_ReDoS"
metadata:
  source: prx-waf community rules
