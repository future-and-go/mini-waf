# FR-003 AC-6 — cookie-by-name newtype field.
# Blocks requests carrying a known-bad session cookie value.
# Cookie names are case-sensitive (RFC 6265). The bare `cookie` field
# would match the entire Cookie: header (legacy semantics).
kind: custom_rule_v1
id: fr003-sample-cookie-session
host_code: "*"
name: "Block requests with revoked session cookie"
priority: 50
enabled: true
condition_op: and
conditions:
  - field: { cookie: session }
    operator: in_list
    value:
      - revoked-abc123
      - revoked-def456
      - revoked-ghi789
action: block
action_status: 403
action_msg: "Session has been revoked"
