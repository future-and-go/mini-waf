kind: custom_rule_v1
id: ADV-SSTI-001
name: SSTI - Generic Expression Evaluation Test (${7*7})
enabled: true
action: block
pattern: (?i)(?:\$\{\s*[0-9]+\s*\*\s*[0-9]+\s*\}|\{\{\s*[0-9]+\s*\*\s*[0-9]+\s*\}\}|<%=\s*[0-9]+\s*\*\s*[0-9]+\s*%>|#\{[0-9]+\s*\*\s*[0-9]+\})
category: ssti
severity: critical
paranoia: 1
tags:
- advanced
- ssti
- template-injection
- rce
risk_delta: 60
reference: https://portswigger.net/research/server-side-template-injection
metadata:
  source: prx-waf community rules
