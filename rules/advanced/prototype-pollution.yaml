kind: custom_rule_v1
id: ADV-PROTO-001
name: Prototype Pollution - __proto__ in JSON Body
enabled: true
action: block
pattern: '(?i)"__proto__"\s*:'
pattern_field: body
category: prototype-pollution
severity: critical
paranoia: 1
tags:
- advanced
- prototype-pollution
- nodejs
- rce
risk_delta: 50
reference: https://portswigger.net/web-security/prototype-pollution
