kind: custom_rule_v1
id: ADV-PROTO-002
name: Prototype Pollution - __proto__ in Query String
enabled: true
action: block
pattern: (?i)(?:^|&)(?:[a-zA-Z0-9_.\[\]]+)?(?:%5F%5F|__)proto(?:%5F%5F|__)(?:\[|%5B)
pattern_field: query
category: prototype-pollution
severity: critical
paranoia: 1
tags:
- advanced
- prototype-pollution
- nodejs
- query-string
reference: https://portswigger.net/web-security/prototype-pollution
