kind: custom_rule_v1
id: ADV-XXE-005
name: XXE - Billion Laughs / XML Bomb Attack
enabled: true
action: block
pattern: (?i)<!\s*ENTITY\s+[a-zA-Z0-9_]+\s+["'](?:[a-zA-Z0-9&;]+){10,}["']>(?:[^<]*<!\s*ENTITY\s+[a-zA-Z0-9_]+\s+["'](?:&[a-zA-Z0-9_]+;){2,}["']>){2,}
pattern_field: body
category: xxe
severity: critical
paranoia: 1
tags:
- advanced
- xxe
- billion-laughs
- dos
reference: https://en.wikipedia.org/wiki/Billion_laughs_attack
