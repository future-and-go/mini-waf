kind: custom_rule_v1
id: ADV-XXE-001
name: XXE - DOCTYPE with SYSTEM Identifier
enabled: true
action: block
pattern: (?i)<!\s*DOCTYPE\s+[a-zA-Z_][a-zA-Z0-9_.-]*\s+(?:SYSTEM\s+["'][^"']+["']|\[\s*<!\s*ENTITY)
pattern_field: body
category: xxe
severity: critical
paranoia: 1
tags:
- advanced
- xxe
- doctype
- rce
risk_delta: 60
reference: https://portswigger.net/web-security/xxe
