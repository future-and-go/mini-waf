kind: custom_rule_v1
id: BOT-CRED-001
name: Known Credential Stuffing Tool - SentryMBA
enabled: true
action: block
pattern: (?i)SentryMBA|sentry-mba
pattern_field: user_agent
category: credential-stuffing
severity: critical
paranoia: 1
tags:
- bot-detection
- credential-stuffing
- account-takeover
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-002
name: Known Credential Stuffing Tool - Storm, Apex, SNIPR
enabled: true
action: block
pattern: (?i)(?:Storm-[0-9]|ApexHTTP|SNIPR|BlackBullet|SilverBullet|Woxy|Lauth)
pattern_field: user_agent
category: credential-stuffing
severity: critical
paranoia: 1
tags:
- bot-detection
- credential-stuffing
- account-takeover
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-003
name: Credential Stuffing - Suspicious Login with X-Forwarded-For Rotation Pattern
enabled: true
action: log
pattern: (?i)(?:X-Forwarded-For|X-Real-IP|True-Client-IP|CF-Connecting-IP):\s*(?:[0-9]{1,3}\.){3}[0-9]{1,3}(?:,\s*(?:[0-9]{1,3}\.){3}[0-9]{1,3}){3,}
pattern_field: headers
category: credential-stuffing
severity: high
paranoia: 2
tags:
- bot-detection
- credential-stuffing
- ip-rotation
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-004
name: Login Endpoint Access with Automation Tool UA
enabled: true
action: block
pattern: (?i)(?:Hydra|Medusa|Burp\s*Suite|THC-Hydra|ncrack|crowbar|patator|BruteX|Aircrack|hashcat|john\s*the\s*ripper|ophcrack)
pattern_field: user_agent
category: credential-stuffing
severity: critical
paranoia: 1
tags:
- bot-detection
- credential-stuffing
- brute-force-tool
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-005
name: Account Enumeration via Password Reset Probing
enabled: true
action: log
pattern: (?i)/(?:api/v[0-9]+/)?(?:auth/)?(?:forgot[_-]?password|reset[_-]?password|password[_-]?reset|account[_-]?recovery|recover[_-]?account)(?:/|$|\?)
pattern_field: path
category: credential-stuffing
severity: high
paranoia: 1
tags:
- bot-detection
- account-enumeration
- password-reset
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-006
name: Account Enumeration via Registration Endpoint
enabled: true
action: log
pattern: (?i)/(?:api/v[0-9]+/)?(?:auth/)?(?:register|signup|sign[_-]?up|create[_-]?account|new[_-]?user)(?:/|$|\?)
pattern_field: path
category: credential-stuffing
severity: medium
paranoia: 2
tags:
- bot-detection
- account-enumeration
- registration-abuse
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-007
name: Credential Stuffing - Login with Suspicious Content-Type Override
enabled: true
action: log
pattern: (?i)Content-Type:\s*(?:text/plain|application/octet-stream).*(?:\r\n|$)(?:[^\r\n]*\r\n)*[^\r\n]*(?:password|passwd|credentials)
pattern_field: headers
category: credential-stuffing
severity: medium
paranoia: 2
tags:
- bot-detection
- credential-stuffing
- content-type-abuse
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-008
name: Multi-Account Creation - Disposable Email Patterns
enabled: true
action: block
pattern: (?i)@(?:mailinator|guerrillamail|sharklasers|guerrillamailblock|grr\.la|guerrillamail\.info|yopmail|throwam|trashmail|tempmail|dispostable|maildrop|fakeinbox|mailnull|spam4\.me|spamgourmet|spamspot|spamthisplease|tempr\.email|trbvm|trashmail|0\-mail\.com|filzmail|getairmail|discard\.email|sharklasers\.com|spam\.la)\.(?:com|net|org|io)
pattern_field: body
category: credential-stuffing
severity: medium
paranoia: 2
tags:
- bot-detection
- disposable-email
- fake-registration
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-009
name: Credential Stuffing - JSON Login Array Batch
enabled: true
action: block
pattern: (?i)^\s*\[\s*\{[^}]*(?:username|email|login)[^}]*(?:password|passwd)[^}]*\}\s*,\s*\{[^}]*(?:username|email|login)
pattern_field: body
category: credential-stuffing
severity: critical
paranoia: 1
tags:
- bot-detection
- credential-stuffing
- batch-login
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-010
name: Account Takeover - OTP/2FA Bypass Attempt via Brute Force Endpoint
enabled: true
action: log
pattern: (?i)/(?:api/v[0-9]+/)?(?:auth/)?(?:otp|2fa|mfa|totp|verify[_-]?(?:code|otp|pin|token)|confirm[_-]?(?:code|otp|pin))(?:/|$|\?)
pattern_field: path
category: credential-stuffing
severity: high
paranoia: 2
tags:
- bot-detection
- 2fa-bypass
- otp-brute-force
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-011
name: Token Cracking Tool Signatures - Hashcat Rules in Headers
enabled: true
action: block
pattern: '(?i)(?:X-Token-Crack|X-Cracking-Tool|X-Hash-Type|X-Wordlist)\s*:'
pattern_field: headers
category: credential-stuffing
severity: high
paranoia: 2
tags:
- bot-detection
- token-cracking
- credential-stuffing
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRED-012
name: Suspicious Login - Extremely Long Password Field (Hash Stuffing)
enabled: true
action: log
pattern: (?i)"(?:password|passwd|pass|pwd)"\s*:\s*"[a-fA-F0-9]{32,128}"
pattern_field: body
category: credential-stuffing
severity: high
paranoia: 2
tags:
- bot-detection
- hash-stuffing
- credential-stuffing
reference: https://owasp.org/www-project-automated-threats-to-web-applications/09-Credential-Stuffing
metadata:
  source: prx-waf community rules
