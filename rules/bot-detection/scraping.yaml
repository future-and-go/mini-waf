---
kind: custom_rule_v1
id: BOT-SCRAPE-015
name: Missing Referer on Deep Page (Possible Direct Access Scraping)
enabled: true
action: log
pattern: (?i)/(?:[a-zA-Z0-9_-]+/){3,}[a-zA-Z0-9_-]+(?:\.html?|\.php|\.jsp|/)?(?:\?|$)
pattern_field: path
category: bot-detection
severity: low
paranoia: 4
tags:
- bot-detection
- missing-referer
- direct-access
- scraping
reference: https://owasp.org/www-project-automated-threats-to-web-applications/
metadata:
  source: prx-waf community rules
