---
kind: custom_rule_v1
id: BOT-CRAWL-006
name: WebDriver Header Present
enabled: true
action: block
pattern: '(?i)(?:^|\r\n)(?:webdriver|__webdriver_evaluate|__selenium_evaluate|__webdriver_script_fn|__fxdriver_evaluate|__driver_evaluate|__selenium_unwrapped|__webdriverFunc)\s*:'
pattern_field: headers
category: bot-detection
severity: critical
paranoia: 1
tags:
- bot-detection
- webdriver
- selenium
- crawlers
reference: https://intoli.com/blog/not-possible-to-block-chrome-headless/
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRAWL-007
name: Known Vulnerability Scanner - Nikto
enabled: true
action: block
pattern: (?i)(?:Nikto|nikto/[0-9]|libwhisker)
pattern_field: user_agent
category: bot-detection
severity: critical
paranoia: 1
tags:
- bot-detection
- scanner
- nikto
- crawlers
reference: https://cirt.net/Nikto2
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRAWL-008
name: Known Vulnerability Scanner - sqlmap, Acunetix, Nessus
enabled: true
action: block
pattern: (?i)(?:sqlmap|acunetix|nessus(?:sd)?|openvas|nmap|masscan|dirbuster|gobuster|wfuzz|ffuf|hydra|medusa|burpsuite|zaproxy|w3af|skipfish|arachni|webscarab|Jorgee|DataCha0s)
pattern_field: user_agent
category: bot-detection
severity: critical
paranoia: 1
tags:
- bot-detection
- scanner
- crawlers
reference: https://owasp.org/www-project-automated-threats-to-web-applications/
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRAWL-009
name: Generic Bad Bot - Known Malicious UA Strings
enabled: true
action: block
pattern: (?i)(?:MJ12bot|AhrefsBot|SemrushBot|DotBot|MajesticSEO|BLEXBot|SeznamBot|Sogou|YandexBot|ZoominfoBot|Scrapy|scrapy/[0-9]|harvester|harvest|WGet|wget/[0-9]|libwww-perl|LWP::|LWPUA|masscan|NetSpark|Brutus|sitecheck\.internetseer)
pattern_field: user_agent
category: bot-detection
severity: high
paranoia: 1
tags:
- bot-detection
- bad-bot
- crawlers
reference: https://github.com/nicowillis/bad-bot-list
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRAWL-010
name: Suspicious Accept-Language - Missing or Wildcard Only
enabled: true
action: log
pattern: (?i)(?:^|\r\n)Accept-Language:\s*(?:\*|\s*)(?:\r\n|$)
pattern_field: headers
category: bot-detection
severity: low
paranoia: 3
tags:
- bot-detection
- suspicious-headers
- crawlers
reference: https://owasp.org/www-project-automated-threats-to-web-applications/
metadata:
  source: prx-waf community rules
