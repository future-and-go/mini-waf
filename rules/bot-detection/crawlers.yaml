kind: custom_rule_v1
id: BOT-CRAWL-001
name: Empty or Missing User-Agent
enabled: true
action: log
pattern: ^\s*$
pattern_field: user_agent
category: bot-detection
severity: medium
paranoia: 2
tags:
- bot-detection
- crawlers
- empty-ua
reference: https://owasp.org/www-project-automated-threats-to-web-applications/
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: BOT-CRAWL-002
name: Headless Chrome Browser Detected
enabled: true
action: block
pattern: (?i)HeadlessChrome|Headless(?:ium|Firefox)|headless
pattern_field: user_agent
category: bot-detection
severity: high
paranoia: 1
tags:
- bot-detection
- headless-browser
- crawlers
reference: https://intoli.com/blog/making-chrome-headless-undetectable/
