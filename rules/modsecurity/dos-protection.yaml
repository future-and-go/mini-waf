kind: custom_rule_v1
id: MODSEC-DOS-001
name: Detect abnormally large request body (potential DoS)
enabled: true
action: block
conditions:
  - field: content_length
    operator: gt
    value: 10485760
category: dos
severity: high
paranoia: 1
tags: [dos, request-size]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-002
name: Detect abnormally large URL (potential buffer overflow / DoS)
enabled: true
action: block
script: "path.len() > 1024"
category: dos
severity: high
paranoia: 1
tags: [dos, path-length]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-003
name: Detect excessive query string arguments
enabled: true
action: block
script: "query.len() > 0 && query.split(\"&\").len() > 255"
category: dos
severity: medium
paranoia: 2
tags: [dos, query-args]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-004
name: Detect slowloris-style incomplete request patterns
enabled: true
action: log
pattern: "(?i)Content-Length:\\s*0\\s*$"
pattern_field: headers
category: dos
severity: medium
paranoia: 2
tags: [dos, slowloris]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-005
name: Block HTTP TRACE method (XST attack vector)
enabled: true
action: block
pattern: "^TRACE$"
pattern_field: method
category: dos
severity: medium
paranoia: 1
tags: [dos, xst, method]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-006
name: Block HTTP DEBUG method
enabled: true
action: block
pattern: "^DEBUG$"
pattern_field: method
category: dos
severity: high
paranoia: 1
tags: [dos, method, iis]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-007
name: Detect R.U.D.Y. attack (slow POST body)
enabled: true
action: log
conditions:
  - field: content_type
    operator: regex
    value: "(?i)application/x-www-form-urlencoded"
category: dos
severity: medium
paranoia: 2
tags: [dos, rudy, slow-post]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-008
name: Detect hash DoS attack (many collision parameters)
enabled: true
action: log
conditions:
  - field: content_length
    operator: gt
    value: 1048576
category: dos
severity: high
paranoia: 2
tags: [dos, hash-dos]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-009
name: Block recursive payload nesting (XML bomb / billion laughs)
enabled: true
action: block
pattern: "(?i)(?:<!ENTITY\\s+\\w+\\s+\"[^\"]{0,100}\"\\s*>.*?){5,}"
pattern_field: body
category: dos
severity: critical
paranoia: 1
tags: [dos, xml-bomb, billion-laughs]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-010
name: Detect ReDoS patterns (catastrophic backtracking payloads)
enabled: true
action: log
pattern: "(?:[a-zA-Z0-9+/]{76}\\r?\\n){10,}"
category: dos
severity: medium
paranoia: 3
tags: [dos, redos]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-011
name: Block abnormally large cookie header
enabled: true
action: block
script: "cookie.len() >= 8192"
category: dos
severity: medium
paranoia: 2
tags: [dos, cookie-size]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: MODSEC-DOS-012
name: Detect zero-length Content-Type with body (protocol anomaly)
enabled: true
action: log
conditions:
  - field: content_type
    operator: regex
    value: "^$"
category: dos
severity: medium
paranoia: 2
tags: [dos, protocol-anomaly]
metadata:
  source: prx-waf community rules
