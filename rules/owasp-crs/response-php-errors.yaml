version: '1.0'
description: OWASP CRS rules converted from RESPONSE-953-DATA-LEAKAGES-PHP.conf
source: OWASP Core Rule Set v4.x (https://github.com/coreruleset/coreruleset)
license: Apache-2.0
rules:
- id: CRS-RESP-953100
  name: PHP Information Leakage
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: pm_from_file
  value: php-errors.data
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 953100
- id: CRS-RESP-953110
  name: PHP source code leakage
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: regex
  value: (?:\b(?:f(?:tp_(?:nb_)?f?(?:ge|pu)t|get(?:s?s|c)|scanf|write|open|read)|gz(?:(?:encod|writ)e|compress|open|read)|s(?:ession_start|candir)|read(?:(?:gz)?file|dir)|move_uploaded_file|(?:proc_|bz)open|call_user_func)|\$_(?:(?:pos|ge)t|session))\b
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 953110
- id: CRS-RESP-953120
  name: PHP source code leakage
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: regex
  value: (?i)<\?(?:=|php)?\s+
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 953120
