version: '1.0'
description: Protocol Enforcement (OWASP CRS 920)
source: OWASP CRS v4.25.0
license: Apache-2.0
rules:
  # Body size enforcement (custom, not in standard CRS but critical)
  - id: CRS-920160
    name: Request body too large
    category: protocol-attack
    severity: critical
    paranoia: 1
    field: content_length
    operator: gt
    value: 10485760
    action: block
    tags:
      - owasp-crs
      - protocol-attack
    crs_id: 920160

  - id: CRS-920260
    name: Unicode Full/Half Width Abuse Attack Attempt
    category: protocol-attack
    severity: warning
    paranoia: 1
    field: all
    operator: regex
    value: (?i)%uff[0-9a-f]{2}
    action: block
    tags:
      - owasp-crs
      - protocol-attack
    crs_id: 920260

  - id: CRS-920350
    name: Host header is a numeric IP address
    category: protocol-attack
    severity: warning
    paranoia: 1
    field: header_host
    operator: regex
    value: (?:^([\d.]+|\[[\da-f:]+\]|[\da-f:]+)(:[\d]+)?$)
    action: block
    tags:
      - owasp-crs
      - protocol-attack
    crs_id: 920350

  - id: CRS-920610
    name: Raw (unencoded) fragment in request URI
    category: protocol-attack
    severity: critical
    paranoia: 1
    field: path
    operator: contains
    value: '#'
    action: block
    tags:
      - owasp-crs
      - protocol-attack
    crs_id: 920610

  - id: CRS-920200
    name: 'Range: Too many fields (6 or more)'
    category: protocol-attack
    severity: warning
    paranoia: 2
    field: header_range
    operator: regex
    value: ^bytes=(?:(?:\d+)?-(?:\d+)?\s*,?\s*){6}
    action: block
    tags:
      - owasp-crs
      - protocol-attack
    crs_id: 920200

  - id: CRS-920230
    name: Multiple URL Encoding Detected
    category: protocol-attack
    severity: warning
    paranoia: 2
    field: query
    operator: regex
    value: '%[0-9a-fA-F]{2}'
    action: block
    tags:
      - owasp-crs
      - protocol-attack
    crs_id: 920230

  - id: CRS-920460
    name: Abnormal character escapes in request
    category: protocol-attack
    severity: critical
    paranoia: 4
    field: all
    operator: regex
    value: (?:^|[^\x5c])\x5c[cdeghijklmpqwxyz123456789]
    action: block
    tags:
      - owasp-crs
      - protocol-attack
    crs_id: 920460
