kind: custom_rule_v1
id: CRS-931100
name: 'Possible Remote File Inclusion (RFI) Attack: URL Parameter using IP Address'
enabled: true
action: block
pattern: (?i)^(f(?:ile|tps?)|https?|ssh)://(?:\[?[0-9a-f]+:[0-:a-f]+\]?|[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})
pattern_field: query
category: rfi
severity: critical
paranoia: 1
tags:
- owasp-crs
- rfi
- attack-rfi
metadata:
  crs_id: '931100'
  source: OWASP CRS v4.25.0
