kind: custom_rule_v1
id: CRS-931120
name: 'Possible Remote File Inclusion (RFI) Attack: URL Payload Used w/Trailing Question Mark Character (?)'
enabled: true
action: block
pattern: ^(?i:file|ftps?|https?).*?\?+$
pattern_field: query
category: rfi
severity: critical
paranoia: 1
tags:
