kind: custom_rule_v1
id: CRS-943100
name: 'Possible Session Fixation Attack: Setting Cookie Values in HTML'
enabled: true
action: block
pattern: (?i)\.cookie\b.*?;[^0-9A-Z_a-z]*?(?:expires|domain)[^0-9A-Z_a-z]*?=|\bhttp-equiv[^0-9A-Z_a-z]+set-cookie\b
category: session-fixation
severity: critical
paranoia: 1
tags:
- owasp-crs
- session-fixation
metadata:
  crs_id: '943100'
  source: OWASP CRS v4.25.0
---
kind: custom_rule_v1
id: CRS-943110
name: 'Possible Session Fixation Attack: SessionID Parameter Name with Off-Domain Referer'
enabled: true
action: block
pattern: ^(?:j(?:se(?:ssionid|rvsession)|wsession)|(?:asp(?:\.net_)?session|zend_session_)id|p(?:hpsessi(?:on|d)|lay_session)|(?:(?:w(?:eblogic|l)|rack\.|laravel_)sessio|(?:next-auth\.session-|meteor_login_)toke)n|s(?:(?:ession[\-_]?|ails\.s)id|hiny-token)|_(?:session_id|(?:(?:flask|rails)_sessio|_(?:secure|host)-next-auth\.session-toke)n)|c(?:f(?:s?id|token)|onnect\.sid|akephp|i_session)|koa[\.:]sess)$
pattern_field: query
category: session-fixation
severity: critical
paranoia: 1
tags:
- owasp-crs
- session-fixation
metadata:
  crs_id: '943110'
  source: OWASP CRS v4.25.0
---
kind: custom_rule_v1
id: CRS-943120
name: 'Possible Session Fixation Attack: SessionID Parameter Name with No Referer'
enabled: true
action: block
pattern: ^(?:j(?:se(?:ssionid|rvsession)|wsession)|(?:asp(?:\.net_)?session|session[\-_]?)id|phpsessi(?:on|d)|(?:weblogic|laravel_)session|_(?:session_id|flask_session)|c(?:f(?:s?id|token)|onnect\.sid))$
pattern_field: query
category: session-fixation
severity: critical
paranoia: 1
tags:
- owasp-crs
- session-fixation
metadata:
  source: OWASP CRS v4.25.0
  crs_id: '943120'
