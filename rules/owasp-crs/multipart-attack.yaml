kind: custom_rule_v1
id: CRS-922130
name: Multipart header contains characters outside of valid range
enabled: true
action: block
pattern: '[^\x21-\x7E][\x21-\x39\x3B-\x7E]*:'
category: multipart-attack
severity: critical
paranoia: 1
tags:
- owasp-crs
- multipart-attack
metadata:
  crs_id: '922130'
  source: OWASP CRS v4.25.0
