kind: custom_rule_v1
id: CRS-922120
name: Content-Transfer-Encoding was deprecated by rfc7578 in 2015 and should not be used
enabled: true
action: block
pattern: content-transfer-encoding:(.*)
category: multipart-attack
severity: critical
paranoia: 1
tags:
- owasp-crs
- multipart-attack
metadata:
  source: OWASP CRS v4.25.0
  crs_id: '922120'
