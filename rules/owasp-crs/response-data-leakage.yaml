version: '1.0'
description: OWASP CRS rules converted from RESPONSE-950-DATA-LEAKAGES.conf
source: OWASP Core Rule Set v4.x (https://github.com/coreruleset/coreruleset)
license: Apache-2.0
rules:
- id: CRS-RESP-950130
  name: Directory Listing
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: regex
  value: (?:<(?:TITLE>Index of.*?<H|title>Index of.*?<h)1>Index of|>\[To Parent Directory\]</[Aa]><br>)
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 950130
- id: CRS-RESP-950140
  name: CGI source code leakage
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: regex
  value: ^#\!\s?/
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 950140
- id: CRS-RESP-950150
  name: ASP.NET exception leakage
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: pm_from_file
  value: asp-dotnet-errors.data
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 950150
- id: CRS-RESP-950100
  name: The Application Returned a 500-Level Status Code
  category: data-leakage
  severity: high
  paranoia: 2
  field: body
  operator: regex
  value: ^5\d{2}$
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 950100
