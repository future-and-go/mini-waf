rules:
- id: CRS-PROTO-911100
  name: Method is not allowed by policy
  category: protocol
  severity: critical
  paranoia: 1
  field: method
  operator: regex
  value: '!@within %{tx.allowed_methods}'
  action: block
  tags:
  - owasp-crs
  - generic
  crs_id: 911100
