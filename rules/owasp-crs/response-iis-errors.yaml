version: '1.0'
description: OWASP CRS rules converted from RESPONSE-954-DATA-LEAKAGES-IIS.conf
source: OWASP Core Rule Set v4.x (https://github.com/coreruleset/coreruleset)
license: Apache-2.0
rules:
- id: CRS-RESP-954100
  name: Disclosure of IIS install location
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: regex
  value: (?i)[a-z]:[\x5c/]inetpub\b
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 954100
- id: CRS-RESP-954110
  name: Application Availability Error
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: regex
  value: '(?:Microsoft OLE DB Provider for SQL Server(?:</font>.{1,20}?error ''800(?:04005|40e31)''.{1,40}?Timeout expired|
    \(0x80040e31\)<br>Timeout expired<br>)|<h1>internal server error</h1>.*?<h2>part of the server has crashed or it has a
    configuration error\.</h2>|cannot connect to the server: timed out)'
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 954110
- id: CRS-RESP-954120
  name: IIS Information Leakage
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: pm_from_file
  value: iis-errors.data
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 954120
- id: CRS-RESP-954130
  name: IIS Information Leakage
  category: data-leakage
  severity: high
  paranoia: 1
  field: body
  operator: regex
  value: '!@rx ^404$'
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 954130
- id: CRS-RESP-954101
  name: Disclosure of IIS install location
  category: data-leakage
  severity: high
  paranoia: 2
  field: body
  operator: regex
  value: (?i)[\x5c/]inetpub\b
  action: block
  tags:
  - owasp-crs
  - disclosure
  crs_id: 954101
