kind: custom_rule_v1
id: GEO-COUNTRY-001
name: Block requests from high-risk countries (example)
enabled: true
action: block
conditions:
  - field: geo_iso
    operator: in_list
    value: ["KP", "IR", "SY"]
category: geo
severity: high
paranoia: 1
tags: [geoip, country-block]
metadata:
  source: prx-waf community rules
---
kind: custom_rule_v1
id: GEO-COUNTRY-002
name: Log requests from Tor exit nodes (geo example)
enabled: true
action: log
conditions:
  - field: geo_isp
    operator: contains
    value: "Tor"
category: geo
severity: medium
paranoia: 2
tags: [geoip, tor]
metadata:
  source: prx-waf community rules
