# cargo-deny configuration — OpenPRX standard v2

[graph]
all-features = true
exclude-dev = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
unmaintained = "all"
unsound = "workspace"
# Review all ignores by: 2026-06-01.
# Keep this list trimmed to advisories that still resolve against the
# current Cargo.lock — cargo-deny errors on `advisory-not-detected`. If a
# transitive dep gets bumped past an advisory, drop the entry here.
ignore = [
    # rsa Marvin timing sidechannel — advertised via sqlx-mysql which is an
    # OPTIONAL feature we never enable (default-features=false; only the
    # `postgres` feature is on). The vulnerable code is never compiled.
    { id = "RUSTSEC-2023-0071", reason = "rsa via sqlx-mysql: feature not enabled" },
    # Unmaintained transitive deps via pingora.
    { id = "RUSTSEC-2025-0069", reason = "daemonize: pingora transitive dep" },
    { id = "RUSTSEC-2024-0388", reason = "derivative: pingora transitive dep" },
    # rand 0.8.5 unsoundness — only triggers when a custom log::Logger calls
    # `rand::rng()` reentrantly during `ThreadRng` reseed. We have no custom
    # logger that touches rand. Upgrade to rand 0.9 when all transitive deps
    # support it.
    { id = "RUSTSEC-2026-0097", reason = "rand: requires pathological custom-logger setup we don't have" },
    # rustls-webpki name-constraint validation issues — fixed in 0.103.11+,
    # blocked by rustls 0.23 transitive pin. We use rustls for QUIC mTLS
    # cluster transport with our own CA, so attacker-controlled cert chains
    # are not a vector here.
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki: wildcard name constraint, irrelevant to cluster mTLS" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki: URI name constraint, irrelevant to cluster mTLS" },
    # thin-vec UAF/double-free in IntoIter::drop when element-drop panics.
    # Pulled in via rhai 1.24 for our custom-rule scripting. Rhai scripts
    # are admin-uploaded and sandboxed — the panic-during-drop scenario
    # requires hostile script code which would be a separate access-control
    # failure first.
    { id = "RUSTSEC-2026-0099", reason = "thin-vec via rhai: requires hostile script in admin-controlled context" },
    { id = "RUSTSEC-2026-0103", reason = "thin-vec UAF/double-free: same rhai transitive dep, same mitigation as 0099" },
    # rustls-pemfile 2.x unmaintained, superseded by rustls-pki-types parsers.
    # Transitive via redis 0.27 -> rustls-native-certs 0.7. We do not parse
    # PEM ourselves; redis only uses it for TLS root certs. Drops when redis
    # upgrades rustls-native-certs to 0.8+.
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile via redis 0.27: transitive, no PEM parsing in our code" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
include-dev = false
include-build = true
unused-allowed-license = "allow"

[licenses.private]
ignore = true

[[licenses.clarify]]
crate = "maker"
expression = "MIT"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true
allow-workspace = true
highlight = "all"

deny = [
    { crate = "openssl", reason = "Use rustls-tls instead", use-instead = "rustls" },
    { crate = "openssl-sys", reason = "Use rustls-tls instead" },
]

[[bans.features]]
crate = "reqwest"
deny = ["native-tls", "native-tls-vendored"]

[bans.workspace-dependencies]
duplicates = "warn"
unused = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = [
    "https://github.com/lionsoul2014/ip2region.git",
]
