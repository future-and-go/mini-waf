# nginx load balancer in front of 4 juice-shop instances.
# Sits between mini-waf (which only knows single upstream) and the backends.
# Tuned for high RPS benchmarking: large worker pool, generous keepalive,
# minimal logging to avoid disk I/O at 10k+ rps.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    # Keep response logs minimal at high RPS — disable access logs entirely.
    access_log off;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Large hash tables to avoid resize warnings at scale
    server_names_hash_bucket_size 128;
    proxy_headers_hash_max_size   1024;
    proxy_headers_hash_bucket_size 128;

    # Upstream: 6 juice-shop instances. least_conn distributes new requests to
    # the backend with the fewest active connections, which is fairer than
    # round-robin when responses have variable latency.
    upstream juice_shop_backend {
        least_conn;

        server juice-shop-1:3000 max_fails=3 fail_timeout=10s;
        server juice-shop-2:3000 max_fails=3 fail_timeout=10s;
        server juice-shop-3:3000 max_fails=3 fail_timeout=10s;
        server juice-shop-4:3000 max_fails=3 fail_timeout=10s;
        server juice-shop-5:3000 max_fails=3 fail_timeout=10s;
        server juice-shop-6:3000 max_fails=3 fail_timeout=10s;

        # Reuse upstream connections to drastically reduce TCP setup cost
        # at high RPS. 256 idle conns per worker = plenty of headroom.
        keepalive          256;
        keepalive_requests 10000;
        keepalive_timeout  60s;
    }

    server {
        listen 80 default_server reuseport backlog=65535;
        server_name _;

        # Health check endpoint for Docker / WAF probes
        location = /lb-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://juice_shop_backend;

            # HTTP/1.1 + connection reuse to upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Forward original request headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Generous timeouts for benchmarking. Failed requests are still
            # surfaced quickly enough to avoid masking real issues.
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Retry on a different backend if one fails — improves resilience
            # under load without hiding errors completely.
            proxy_next_upstream     error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }
}
