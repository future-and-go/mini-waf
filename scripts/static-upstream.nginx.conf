# Static upstream for accurate WAF-only benchmarking.
# Serves canned, fixed-size responses with zero processing cost so that
# upstream is never the bottleneck. This isolates WAF overhead in benchmarks.
#
# Capacity on a typical laptop: 80,000-150,000 RPS per worker, single core.
# With auto worker count + 2 CPUs: well above 200k RPS.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    access_log off;
    error_log  /var/log/nginx/error.log error;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 100000;

    # Pre-defined response bodies of various sizes mimicking juice-shop traffic.
    # Sized to match TRAFFIC_MIX so latency comparison is fair.
    map $uri $resp_size_class {
        default                "small";
        ~^/assets/.*\.json$    "medium";
        ~^/assets/.*\.png$     "large";
        ~^/api/                "medium";
        ~^/rest/               "small";
    }

    server {
        listen 80 default_server reuseport backlog=65535;
        server_name _;

        # Universal handler — returns 200 with a deterministic small body.
        # No file I/O, no upstream — purely in-memory.
        location / {
            add_header Content-Type "application/json" always;
            add_header X-Upstream "static-upstream" always;
            return 200 '{"status":"ok","upstream":"static","path":"$uri","rps_unbounded":true}';
        }

        # Endpoint that mimics a slightly larger asset response (for /assets/* paths)
        location ~ ^/assets/.*\.json$ {
            add_header Content-Type "application/json" always;
            return 200 '{"locale":"en","strings":{"a":"hello","b":"world","c":"benchmark","d":"static"}}';
        }

        # Fake "image" — small fixed binary-ish payload
        location ~ ^/assets/.*\.png$ {
            add_header Content-Type "image/png" always;
            return 200 "\x89PNG\r\n\x1a\n_static_response_for_benchmarking_only_no_real_image_data";
        }

        # Health endpoint
        location = /__health {
            access_log off;
            return 200 "ok\n";
        }
    }
}
