# Serves the Refine SPA + reverse-proxies waf-api (REST + WebSocket).
#
# Why proxy through nginx instead of letting the browser hit prx-waf:9527
# directly:
#   1. Avoids CORS preflight on every request
#   2. Same-origin cookies/credentials for future SSO
#   3. WebSocket auth via Sec-WebSocket-Protocol works without cross-origin
#      complications

# Map for WebSocket upgrade header (required for proxy_pass over WS).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets (Vite produces hashed filenames so safe to cache hard)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/wasm font/woff2;
    gzip_min_length 1024;

    # ── WebSocket (events stream) ────────────────────────────────────────────
    # Must be declared before /api/ because nginx matches by prefix length and
    # we need the upgrade headers attached to /ws/* specifically.
    location /ws/ {
        proxy_pass http://prx-waf:9527;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # long-lived
        proxy_send_timeout 3600s;
    }

    # ── REST API ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://prx-waf:9527;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Asset cache ──────────────────────────────────────────────────────────
    # Vite emits content-hashed filenames in /assets/, so 1-year cache is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # HashRouter doesn't strictly need this (everything stays on /index.html
    # via the # fragment), but it makes deep-link refreshes work if we ever
    # switch to BrowserRouter.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
